name: MiniMesaj CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Test ──────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: minimesaj_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: PHP kurulumu
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, mbstring, exif, pcntl, bcmath, gd, zip, intl, redis
          coverage: none

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Bağımlılıkları kur
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: .env hazırla
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Testleri çalıştır (SQLite)
        run: php vendor/bin/pest --parallel
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          QUEUE_CONNECTION: sync
          BROADCAST_CONNECTION: "null"

      - name: Testleri çalıştır (MySQL)
        run: php vendor/bin/pest
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: minimesaj_test
          DB_USERNAME: root
          DB_PASSWORD: root
          QUEUE_CONNECTION: sync
          BROADCAST_CONNECTION: "null"

  # ── Lint & Statik Analiz ──────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP kurulumu
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring
          coverage: none

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Bağımlılıkları kur
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Pint (kod stili)
        run: vendor/bin/pint --test

  # ── Docker Build ──────────────────────────────────────────────────
  build:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: GHCR'a giriş
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Sunucuya dağıt
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/minimesaj
            docker compose pull app
            docker compose up -d app
            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache
            docker compose exec -T app php artisan event:cache
            docker compose exec -T app php artisan queue:restart
            echo "Deploy tamamlandı: $(date)"
