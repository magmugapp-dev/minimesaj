<!doctype html>
<html lang="tr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MiniMesaj</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <main class="kapsayici">
        <!-- Giris Paneli -->
        <section id="girisPanel" class="panel gizli">
            <p class="etiket">Instagram DM dinleyici</p>
            <h1>MiniMesaj</h1>
            <p class="aciklama">Devam etmek icin giris yapin.</p>

            <div class="formGrubu">
                <input id="kullaniciAdiAlani" type="text" placeholder="Kullanici adi" autocomplete="username">
            </div>
            <div class="formGrubu">
                <input id="sifreAlani" type="password" placeholder="Sifre" autocomplete="current-password">
            </div>
            <p id="girisHatasi" class="hataMesaji gizli"></p>
            <button id="girisDugmesi" type="button" class="birincil">Giris yap</button>
        </section>

        <!-- Ana Panel (giris yapilmissa) -->
        <section id="anaPanel" class="panel gizli">
            <p class="etiket">Instagram DM dinleyici</p>
            <h1>MiniMesaj</h1>
            <p class="aciklama">Sistemi ac, DM sekmesini one getir ve yeni mesajlari gercek zamanli izle.</p>

            <!-- Hesap Durumu -->
            <section id="hesapBolumu" class="hesapSatiri">
                <div>
                    <p class="anahtarBaslik">Instagram Hesabi</p>
                    <p id="hesapDurumMetni" class="durumMetni">Hesap bagli degil</p>
                </div>
                <button id="hesapIslemDugmesi" type="button" class="kucukDugme">Bagla</button>
            </section>

            <!-- Hesap Baglama Formu -->
            <section id="hesapBaglamaFormu" class="gizli">
                <div class="formGrubu">
                    <input id="igKullaniciAdiAlani" type="text" placeholder="Instagram kullanici adi">
                </div>
                <p id="hesapBaglaHatasi" class="hataMesaji gizli"></p>
                <div class="dugmeSatiri">
                    <button id="hesapBaglaDugmesi" type="button" class="birincil kucuk">Bagla</button>
                    <button id="hesapIptalDugmesi" type="button" class="ikincilDugme kucuk">Iptal</button>
                </div>
            </section>

            <!-- Sistem Anahtari -->
            <section class="anahtarSatiri">
                <div>
                    <p class="anahtarBaslik">Sistem</p>
                    <p id="durumMetni" class="durumMetni">Sistem kapali</p>
                </div>

                <label class="anahtar">
                    <input id="sistemAnahtari" type="checkbox">
                    <span class="kaydirici"></span>
                </label>
            </section>

            <button id="dmDugmesi" type="button" class="birincil">DM sayfasini ac</button>

            <div class="altBilgiSatiri">
                <span id="baglantiBilgisi" class="baglantiEtiketi">Baglanti yok</span>
                <button id="cikisDugmesi" type="button" class="metinDugmesi">Cikis yap</button>
            </div>
        </section>
    </main>

    <script src="popup.js"></script>
</body>

</html>
