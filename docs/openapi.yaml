                  maxLength: 100
                kisilik_aciklamasi:
                  type: string
                  maxLength: 2000
                  nullable: true
                konusma_tonu:
                  type: string
                  maxLength: 100
                konusma_stili:
                  type: string
                  maxLength: 100
                emoji_seviyesi:
                  type: integer
                  minimum: 0
                  maximum: 10
                flort_seviyesi:
                  type: integer
                  minimum: 0
                  maximum: 10
                giriskenlik_seviyesi:
                  type: integer
                  minimum: 0
                  maximum: 10
                utangaclik_seviyesi:
                  type: integer
                  minimum: 0
                  maximum: 10
                duygusallik_seviyesi:
                  type: integer
                  minimum: 0
                  maximum: 10
                kiskanclik_seviyesi:
                  type: integer
                  minimum: 0
                  maximum: 10
                mizah_seviyesi:
                  type: integer
                  minimum: 0
                  maximum: 10
                zeka_seviyesi:
                  type: integer
                  minimum: 0
                  maximum: 10
                ilk_mesaj_atar_mi:
                  type: boolean
                ilk_mesaj_sablonu:
                  type: string
                  maxLength: 1000
                  nullable: true
                gunluk_konusma_limiti:
                  type: integer
                  minimum: 0
                tek_kullanici_gunluk_mesaj_limiti:
                  type: integer
                  minimum: 0
                minimum_cevap_suresi_saniye:
                  type: integer
                  minimum: 0
                maksimum_cevap_suresi_saniye:
                  type: integer
                  minimum: 0
                ortalama_mesaj_uzunlugu:
                  type: integer
                  minimum: 10
                mesaj_uzunlugu_min:
                  type: integer
                  minimum: 1
                mesaj_uzunlugu_max:
                  type: integer
                  minimum: 10
                sesli_mesaj_gonderebilir_mi:
                  type: boolean
                foto_gonderebilir_mi:
                  type: boolean
                gece_aktif_mi:
                  type: boolean
                gunduz_aktif_mi:
                  type: boolean
                sistem_komutu:
                  type: string
                  maxLength: 5000
                  nullable: true
                yasakli_konular:
                  type: array
                  items:
                    type: string
                  nullable: true
                zorunlu_kurallar:
                  type: array
                  items:
