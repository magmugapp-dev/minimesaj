      summary: Satın alma fişini doğrula
      description: >
        Apple/Google uygulama mağazasından gelen satın alma fişini doğrular
        ve puan yükler. Aynı fiş tekrar işlenmez (idempotent).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platform, fis_verisi, urun_kodu, tutar, para_birimi]
              properties:
                platform:
                  type: string
                  enum: [ios, android, web]
                fis_verisi:
                  type: string
                  description: Platform'dan gelen fiş ham verisi
                urun_kodu:
                  type: string
                  maxLength: 100
                tutar:
                  type: number
                  minimum: 0
                para_birimi:
                  type: string
                  minLength: 3
                  maxLength: 3
                  example: TRY
      responses:
        '201':
          description: Ödeme onaylandı
          content:
            application/json:
              schema:
                type: object
                properties:
                  mesaj:
                    type: string
                    example: Ödeme onaylandı.
                  odeme:
                    type: object
        '200':
          description: Bu fiş zaten işlenmiş (idempotent)
          content:
            application/json:
              schema:
                type: object
                properties:
                  mesaj:
                    type: string
                    example: Bu fiş zaten işlenmiş.
                  odeme:
                    type: object
