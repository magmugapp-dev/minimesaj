      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reklam_platformu, reklam_birim_kodu]
              properties:
                reklam_platformu:
                  type: string
                  maxLength: 50
                  example: admob
                reklam_birim_kodu:
                  type: string
                  maxLength: 100
      responses:
        '201':
          description: Ödül kazanıldı
          content:
            application/json:
              schema:
                type: object
                properties:
                  mesaj:
                    type: string
                    example: "Ödül kazandınız: +5 puan"
                  kalan_hak:
                    type: integer
        '429':
          description: Günlük limit aşıldı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HataMesaji'
              example:
                mesaj: Günlük reklam ödül limitine ulaştınız.
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ══════════════════════════════════════════════════════════════════
  # HEDİYE
  # ══════════════════════════════════════════════════════════════════
  /hediye/gonder:
    post:
      tags: [Hediye]
      summary: Hediye gönder
      description: Başka bir kullanıcıya puan harcayarak hediye gönderir.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [alici_user_id, hediye_tipi, puan_degeri]
              properties:
                alici_user_id:
                  type: integer
                  description: Alıcı kullanıcı ID
                hediye_tipi:
                  type: string
                  maxLength: 50
                  example: gul
                puan_degeri:
                  type: integer
                  minimum: 1
                  maximum: 10000
                mesaj:
                  type: string
                  maxLength: 500
                  nullable: true
      responses:
        '201':
          description: Hediye gönderildi
          content:
            application/json:
              schema:
                type: object
                properties:
                  mesaj:
                    type: string
                    example: Hediye gönderildi!
                  gonderim:
                    type: object
        '422':
          description: Kendine hediye veya yetersiz puan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HataMesaji'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ══════════════════════════════════════════════════════════════════
  # ADMİN
  # ══════════════════════════════════════════════════════════════════
  /admin/istatistik/ozet:
    get:
      tags: [Admin]
      summary: Günlük istatistik özeti
      description: Belirtilen tarihe ait platform istatistiklerini döner. Admin scope gerektirir.
      parameters:
        - name: tarih
          in: query
          schema:
            type: string
            format: date
          description: Varsayılan bugünün tarihi
      responses:
        '200':
          description: İstatistik özeti
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IstatistikOzeti'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/sikayetler:
    get:
      tags: [Admin]
      summary: Şikayetleri listele
      description: Tüm şikayetleri sayfalı listeler. Durum filtresi opsiyonel.
      parameters:
        - name: durum
          in: query
          schema:
            type: string
            enum: [beklemede, inceleniyor, sonuclandi, reddedildi]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Şikayet listesi (sayfalı)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SikayetResource'
                  links:
                    $ref: '#/components/schemas/SayfaLinkleri'
                  meta:
                    $ref: '#/components/schemas/SayfaMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/sikayetler/{sikayet}:
    patch:
      tags: [Admin]
      summary: Şikayet durumunu güncelle
      parameters:
        - name: sikayet
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [durum]
              properties:
                durum:
                  type: string
                  enum: [beklemede, inceleniyor, sonuclandi, reddedildi]
                yonetici_notu:
                  type: string
                  maxLength: 2000
                  nullable: true
      responses:
        '200':
          description: Şikayet güncellendi
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SikayetResource'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
