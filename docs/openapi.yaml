openapi: 3.0.3
info:
  title: MiniMesaj API
  description: >
    MiniMesaj — Flutter tabanlı tanışma uygulaması ve Chrome eklentisi için REST API.
    Tüm endpoint'ler `/api` prefix'i altında çalışır.
    Kimlik doğrulama Sanctum Bearer Token ile yapılır.
  version: 1.0.0
  contact:
    name: MiniMesaj Destek

servers:
  - url: http://minimesaj.test/api
    description: Yerel geliştirme
  - url: https://api.minimesaj.com/api
    description: Production

tags:
  - name: Kimlik
    description: Kayıt, giriş, çıkış ve kullanıcı bilgileri
  - name: Profil
    description: Kullanıcı profili görüntüleme ve güncelleme
  - name: Fotoğraf
    description: Profil fotoğrafı yönetimi
  - name: Eşleşme
    description: Eşleşme listeleme ve sonlandırma
  - name: Sohbet
    description: Sohbet listeleme
  - name: Mesaj
    description: Mesaj gönderme ve listeleme
  - name: Bildirim
    description: Uygulama içi bildirimler
  - name: Engelleme
    description: Kullanıcı engelleme işlemleri
  - name: Şikayet
    description: Şikayet oluşturma
  - name: Instagram
    description: Instagram hesap, kişi ve mesaj yönetimi (Chrome eklentisi)
  - name: Yapay Zeka
    description: AI ayar görüntüleme ve güncelleme
  - name: Ödeme
    description: Ödeme doğrulama, puan ve reklam ödülü
  - name: Hediye
    description: Hediye gönderme
  - name: Admin
    description: Yönetim paneli (admin scope gerekli)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Sanctum Bearer Token — kayıt/giriş sonrası alınan token

  schemas:
    # ── Hata Yanıtları ─────────────────────────────────────────────
    HataMesaji:
      type: object
      properties:
        mesaj:
          type: string
          example: İşlem başarısız.

    DogrulamaHatasi:
      type: object
      properties:
        message:
          type: string
          example: Verilen veri geçersiz.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            kullanici_adi:
              - Kullanıcı adı alanı gereklidir.

    # ── Sayfalama Meta ─────────────────────────────────────────────
    SayfaMeta:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: integer
          nullable: true
        last_page:
          type: integer
        per_page:
          type: integer
        to:
          type: integer
          nullable: true
        total:
          type: integer

    SayfaLinkleri:
      type: object
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true

    # ── Resource Şemaları ──────────────────────────────────────────
    KullaniciResource:
      type: object
      properties:
        id:
          type: integer
        ad:
          type: string
        soyad:
          type: string
          nullable: true
        kullanici_adi:
          type: string
        email:
          type: string
          format: email
          description: Sadece kendi profilinde görünür
        hesap_tipi:
          type: string
          enum: [standart, premium]
        hesap_durumu:
          type: string
          enum: [aktif, pasif, askida, banlandi]
        dogum_yili:
          type: integer
          nullable: true
        cinsiyet:
          type: string
          enum: [erkek, kadin, belirtmek_istemiyorum]
        ulke:
          type: string
          nullable: true
        il:
          type: string
          nullable: true
        ilce:
          type: string
          nullable: true
        biyografi:
          type: string
          nullable: true
        profil_resmi:
          type: string
          nullable: true
        cevrim_ici_mi:
          type: boolean
        gorunum_modu:
          type: string
          enum: [acik, koyu, sistem]
          description: Sadece kendi profilinde
        ses_acik_mi:
          type: boolean
          description: Sadece kendi profilinde
        bildirimler_acik_mi:
          type: boolean
          description: Sadece kendi profilinde
        titresim_acik_mi:
          type: boolean
          description: Sadece kendi profilinde
        mevcut_puan:
          type: integer
          description: Sadece kendi profilinde
        gunluk_ucretsiz_hak:
          type: integer
          description: Sadece kendi profilinde
        premium_aktif_mi:
          type: boolean
        premium_bitis_tarihi:
          type: string
          format: date-time
          nullable: true
          description: Sadece kendi profilinde
        son_gorulme_tarihi:
          type: string
          format: date-time
          nullable: true
        fotograflar:
          type: array
          items:
            $ref: '#/components/schemas/FotografResource'
          description: İlişki yüklendiğinde
        ai_ayar:
          $ref: '#/components/schemas/AiAyarResource'
        created_at:
          type: string
          format: date-time

    KullaniciOzetResource:
      type: object
      properties:
        id:
          type: integer
        ad:
          type: string
        kullanici_adi:
          type: string
        profil_resmi:
          type: string
          nullable: true
        cevrim_ici_mi:
          type: boolean

    EslesmeResource:
      type: object
      properties:
        id:
          type: integer
        user:
          $ref: '#/components/schemas/KullaniciOzetResource'
        eslesen_user:
          $ref: '#/components/schemas/KullaniciOzetResource'
        eslesme_turu:
          type: string
        eslesme_kaynagi:
          type: string
        durum:
          type: string
          enum: [aktif, bitti]
        sohbet:
          $ref: '#/components/schemas/SohbetResource'
        created_at:
          type: string
          format: date-time

    SohbetResource:
      type: object
      properties:
        id:
          type: integer
        eslesme_id:
          type: integer
        eslesme:
          $ref: '#/components/schemas/EslesmeResource'
        son_mesaj:
          $ref: '#/components/schemas/MesajResource'
        son_mesaj_tarihi:
          type: string
          format: date-time
          nullable: true
        toplam_mesaj_sayisi:
          type: integer
        durum:
          type: string
          enum: [aktif, kapatildi]
        created_at:
          type: string
          format: date-time

    MesajResource:
      type: object
      properties:
        id:
          type: integer
        sohbet_id:
          type: integer
        gonderen:
          $ref: '#/components/schemas/KullaniciOzetResource'
        mesaj_tipi:
          type: string
          enum: [metin, ses, foto, sistem]
        mesaj_metni:
          type: string
          nullable: true
        dosya_yolu:
          type: string
          nullable: true
        dosya_suresi:
          type: integer
          nullable: true
        okundu_mu:
          type: boolean
        ai_tarafindan_uretildi_mi:
          type: boolean
        cevaplanan_mesaj_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
    FotografResource:
      type: object
      properties:
        id:
          type: integer
        dosya_yolu:
          type: string
        sira_no:
          type: integer
        ana_fotograf_mi:
          type: boolean
        aktif_mi:
          type: boolean
        created_at:
          type: string
          format: date-time

    AiAyarResource:
      type: object
      properties:
        id:
          type: integer
        aktif_mi:
          type: boolean
        saglayici_tipi:
          type: string
          enum: [gemini, openai]
        model_adi:
          type: string
        yedek_saglayici_tipi:
          type: string
          nullable: true
          enum: [gemini, openai]
        yedek_model_adi:
          type: string
          nullable: true
        kisilik_tipi:
          type: string
        kisilik_aciklamasi:
          type: string
          nullable: true
        konusma_tonu:
          type: string
        konusma_stili:
          type: string
        emoji_seviyesi:
          type: integer
          minimum: 0
          maximum: 10
        flort_seviyesi:
          type: integer
          minimum: 0
          maximum: 10
        giriskenlik_seviyesi:
          type: integer
          minimum: 0
          maximum: 10
        utangaclik_seviyesi:
          type: integer
          minimum: 0
          maximum: 10
        duygusallik_seviyesi:
          type: integer
          minimum: 0
          maximum: 10
        kiskanclik_seviyesi:
          type: integer
          minimum: 0
          maximum: 10
        mizah_seviyesi:
          type: integer
          minimum: 0
          maximum: 10
        zeka_seviyesi:
          type: integer
          minimum: 0
          maximum: 10
        ilk_mesaj_atar_mi:
          type: boolean
        ilk_mesaj_sablonu:
          type: string
          nullable: true
        gunluk_konusma_limiti:
          type: integer
        tek_kullanici_gunluk_mesaj_limiti:
          type: integer
        minimum_cevap_suresi_saniye:
          type: integer
        maksimum_cevap_suresi_saniye:
          type: integer
        ortalama_mesaj_uzunlugu:
          type: integer
        mesaj_uzunlugu_min:
          type: integer
        mesaj_uzunlugu_max:
          type: integer
        sesli_mesaj_gonderebilir_mi:
          type: boolean
        foto_gonderebilir_mi:
          type: boolean
        gece_aktif_mi:
          type: boolean
        gunduz_aktif_mi:
          type: boolean
        sistem_komutu:
          type: string
          nullable: true
        yasakli_konular:
          type: array
          items:
            type: string
          nullable: true
        zorunlu_kurallar:
          type: array
          items:
            type: string
          nullable: true
        hafiza_aktif_mi:
          type: boolean
        hafiza_seviyesi:
          type: string
        kullaniciyi_hatirlar_mi:
          type: boolean
        temperature:
          type: number
          format: float
          minimum: 0
          maximum: 2
        top_p:
          type: number
          format: float
          minimum: 0
          maximum: 1
        max_output_tokens:
          type: integer
          minimum: 50
          maximum: 8192

    InstagramHesapResource:
      type: object
      properties:
        id:
          type: integer
        instagram_kullanici_adi:
          type: string
        instagram_profil_id:
          type: string
          nullable: true
        otomatik_cevap_aktif_mi:
          type: boolean
        yarim_otomatik_mod_aktif_mi:
          type: boolean
        aktif_mi:
          type: boolean
        son_baglanti_tarihi:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    InstagramKisiResource:
      type: object
      properties:
        id:
          type: integer
        instagram_kisi_id:
          type: string
        kullanici_adi:
          type: string
          nullable: true
        gorunen_ad:
          type: string
          nullable: true
        profil_resmi:
          type: string
          nullable: true
        notlar:
          type: string
          nullable: true
        son_mesaj_tarihi:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    InstagramMesajResource:
      type: object
      properties:
        id:
          type: integer
        instagram_hesap_id:
          type: integer
        instagram_kisi_id:
          type: integer
        kisi:
          $ref: '#/components/schemas/InstagramKisiResource'
        gonderen_tipi:
          type: string
          enum: [biz, karsi_taraf]
        mesaj_metni:
          type: string
        mesaj_tipi:
          type: string
          enum: [metin, ses, foto]
        ai_cevapladi_mi:
          type: boolean
        gonderildi_mi:
          type: boolean
        instagram_mesaj_kodu:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    SikayetResource:
      type: object
      properties:
        id:
          type: integer
        sikayet_eden:
          $ref: '#/components/schemas/KullaniciOzetResource'
        hedef_tipi:
          type: string
          enum: [user, mesaj]
        hedef_id:
          type: integer
        kategori:
          type: string
        aciklama:
          type: string
          nullable: true
        durum:
          type: string
          enum: [beklemede, inceleniyor, sonuclandi, reddedildi]
        yonetici_notu:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    PuanHareketResource:
      type: object
      properties:
        id:
          type: integer
        islem_tipi:
          type: string
        puan_miktari:
          type: integer
        onceki_bakiye:
          type: integer
        sonraki_bakiye:
          type: integer
        aciklama:
          type: string
          nullable: true
        referans_tipi:
          type: string
          nullable: true
        referans_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time

    IstatistikOzeti:
      type: object
      properties:
        tarih:
          type: string
          format: date
        toplam_kullanici:
          type: integer
        yeni_kayit:
          type: integer
        aktif_kullanici:
          type: integer
        toplam_mesaj:
          type: integer
        toplam_eslesme:
          type: integer
        toplam_sikayet:
          type: integer

    Bildirim:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        data:
          type: object
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

  responses:
    Unauthorized:
      description: Kimlik doğrulaması gerekli.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HataMesaji'
          example:
            mesaj: Kimlik doğrulaması gerekli.
    Forbidden:
      description: Bu işlem için yetkiniz yok.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HataMesaji'
          example:
            mesaj: Bu işlem için yetkiniz yok.
    NotFound:
      description: Kayıt bulunamadı.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HataMesaji'
          example:
            mesaj: Kayıt bulunamadı.
    ValidationError:
      description: Doğrulama hatası.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DogrulamaHatasi'
    TooManyRequests:
      description: Çok fazla istek gönderildi.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HataMesaji'
          example:
            mesaj: Çok fazla istek gönderildi.

security:
  - BearerAuth: []

paths:
  # ══════════════════════════════════════════════════════════════════
  # KİMLİK
  # ══════════════════════════════════════════════════════════════════
  /auth/kayit:
    post:
      tags: [Kimlik]
      summary: Yeni kullanıcı kaydı
      description: Yeni bir kullanıcı hesabı oluşturur ve Bearer token döner.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ad, kullanici_adi, password, password_confirmation, istemci_tipi]
              properties:
                ad:
                  type: string
                  maxLength: 255
                soyad:
                  type: string
                  maxLength: 255
                  nullable: true
                kullanici_adi:
                  type: string
                  maxLength: 255
                  description: Benzersiz olmalı
                email:
                  type: string
                  format: email
                  nullable: true
                password:
                  type: string
                  minLength: 6
                password_confirmation:
                  type: string
                cinsiyet:
                  type: string
                  enum: [erkek, kadin, belirtmek_istemiyorum]
                dogum_yili:
                  type: integer
                  minimum: 1940
                  maximum: 2010
                istemci_tipi:
                  type: string
                  enum: [dating, extension]
      responses:
        '201':
          description: Kayıt başarılı
          content:
            application/json:
              schema:
                type: object
                properties:
                  kullanici:
                    $ref: '#/components/schemas/KullaniciResource'
                  token:
                    type: string
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/giris:
    post:
      tags: [Kimlik]
      summary: Kullanıcı girişi
      description: Kullanıcı adı ve şifre ile giriş yapar, Bearer token döner.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kullanici_adi, password, istemci_tipi]
              properties:
                kullanici_adi:
                  type: string
                password:
                  type: string
                istemci_tipi:
                  type: string
                  enum: [dating, extension, admin]
      responses:
        '200':
          description: Giriş başarılı
          content:
            application/json:
              schema:
                type: object
                properties:
                  kullanici:
                    $ref: '#/components/schemas/KullaniciResource'
                  token:
                    type: string
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/cikis:
    post:
      tags: [Kimlik]
      summary: Çıkış yap
      description: Mevcut token'ı siler.
      responses:
        '200':
          description: Çıkış başarılı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HataMesaji'
              example:
                mesaj: Çıkış yapıldı.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/ben:
    get:
      tags: [Kimlik]
      summary: Mevcut kullanıcı bilgileri
      description: Giriş yapmış kullanıcının profil bilgilerini AI ayarları ve fotoğrafları ile döner.
      responses:
        '200':
          description: Kullanıcı bilgileri
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/KullaniciResource'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ══════════════════════════════════════════════════════════════════
  # PROFİL
  # ══════════════════════════════════════════════════════════════════
  /dating/profil:
    get:
      tags: [Profil]
      summary: Profilimi görüntüle
      responses:
        '200':
          description: Profil bilgileri
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/KullaniciResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Profil]
      summary: Profilimi güncelle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ad:
                  type: string
                  maxLength: 255
                soyad:
                  type: string
                  maxLength: 255
                  nullable: true
                biyografi:
                  type: string
                  maxLength: 1000
                  nullable: true
                dogum_yili:
                  type: integer
                  minimum: 1940
                  maximum: 2010
                cinsiyet:
                  type: string
                  enum: [erkek, kadin, belirtmek_istemiyorum]
                ulke:
                  type: string
                  maxLength: 100
                il:
                  type: string
                  maxLength: 100
                ilce:
                  type: string
                  maxLength: 100
                gorunum_modu:
                  type: string
                  enum: [acik, koyu, sistem]
                ses_acik_mi:
                  type: boolean
                bildirimler_acik_mi:
                  type: boolean
                titresim_acik_mi:
                  type: boolean
      responses:
        '200':
          description: Profil güncellendi
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/KullaniciResource'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ══════════════════════════════════════════════════════════════════
  # FOTOĞRAF
  # ══════════════════════════════════════════════════════════════════
  /dating/fotograflar:
    get:
      tags: [Fotoğraf]
      summary: Fotoğraflarımı listele
      responses:
        '200':
          description: Fotoğraf listesi
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FotografResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Fotoğraf]
      summary: Fotoğraf yükle
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [dosya]
              properties:
                dosya:
                  type: string
                  format: binary
                  description: Resim dosyası (max 5MB)
                ana_fotograf_mi:
                  type: boolean
      responses:
        '201':
          description: Fotoğraf yüklendi
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FotografResource'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dating/fotograflar/{fotograf}:
    delete:
      tags: [Fotoğraf]
      summary: Fotoğraf sil
      parameters:
        - name: fotograf
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Fotoğraf silindi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HataMesaji'
              example:
                mesaj: Fotoğraf silindi.
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ══════════════════════════════════════════════════════════════════


  # ══════════════════════════════════════════════════════════════════
  # EŞLEŞME
  # ══════════════════════════════════════════════════════════════════
  /dating/eslesmeler:
    get:
      tags: [Eşleşme]
      summary: Aktif eşleşmeleri listele
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Aktif eşleşmeler
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EslesmeResource'
                  links:
                    $ref: '#/components/schemas/SayfaLinkleri'
                  meta:
                    $ref: '#/components/schemas/SayfaMeta'
        '401':
